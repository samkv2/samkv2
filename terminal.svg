<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #0d1117; stroke: #30363d; stroke-width: 2; rx: 10; ry: 10; }
      .header { fill: #161b22; rx: 10; ry: 10; }
      .header-flat { fill: #161b22; }
      .btn-red { fill: #ff5f56; }
      .btn-yel { fill: #ffbd2e; }
      .btn-grn { fill: #27c93f; }
      .text { font-family: 'Courier New', Courier, monospace; font-size: 28px; font-weight: bold; fill: #00FF00; line-height: 1.4; }
      .prompt { fill: #00FF00; }
      .cursor { 
        display: inline-block;
        width: 14px;
        height: 28px;
        background-color: #00FF00;
        vertical-align: text-bottom;
        animation: blink 1s step-end infinite;
        margin-left: 2px;
      }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .glow { filter: drop-shadow(0 0 5px rgba(0,255,0,0.5)); }
    </style>
  </defs>
  
  <!-- Window Background -->
  <rect class="bg" x="10" y="10" width="780" height="230" />
  
  <!-- Window Header with flat bottom -->
  <rect class="header" x="10" y="10" width="780" height="40" />
  <rect class="header-flat" x="10" y="30" width="780" height="20" />
  
  <!-- Window Buttons -->
  <circle class="btn-red" cx="35" cy="30" r="8" />
  <circle class="btn-yel" cx="60" cy="30" r="8" />
  <circle class="btn-grn" cx="85" cy="30" r="8" />
  
  <!-- Header Title -->
  <text x="400" y="36" font-family="sans-serif" font-size="16px" fill="#8b949e" text-anchor="middle">bash - user_init</text>
  
  <!-- Terminal Content inside foreignObject to allow text wrapping for larger font size -->
  <foreignObject x="30" y="60" width="740" height="170">
    <div xmlns="http://www.w3.org/1999/xhtml" class="text glow" style="width: 100%; height: 100%;">
      <div><span class="prompt">root@samkv2:~$</span> ./whoami.sh</div>
      <div style="margin-top: 5px; word-wrap: break-word;"><span class="prompt">></span> Hi, This is Shivam Kumar a computer science engineer!</div>
      <div style="margin-top: 5px;"><span class="prompt">></span> Here We Go &#x21B4;.<span class="cursor"></span></div>
    </div>
  </foreignObject>
</svg>
